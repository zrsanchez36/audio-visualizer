      <rect x="396" y="336" width="86" height="352" rx="43"/>
      <rect x="506" y="246" width="86" height="532" rx="43"/>
      <rect x="616" y="336" width="86" height="352" rx="43"/>
      <rect x="726" y="404" width="86" height="216" rx="43"/>
    </g>

    <g opacity="0.86">
      <path d="M236 530C288 530 338 445 406 445C478 445 500 594 570 594C636 594 684 432 742 432C776 432 801 452 824 468" stroke="#4FE6FF" stroke-linecap="round" stroke-width="38" filter="url(#waveGlow)"/>
      <path d="M236 530C288 530 338 445 406 445C478 445 500 594 570 594C636 594 684 432 742 432C776 432 801 452 824 468" stroke="url(#waveStroke)" stroke-linecap="round" stroke-width="18"/>
    </g>
